name: SafeTicket Monorepo CI/CD

on:
  push:
    branches: [ main, develop ] # Ahora el pipeline se activa al subir a main o a dev
  pull_request:
    branches: [ main, develop ]

jobs:
  # ... (Los jobs de ci-backend y ci-frontend se quedan exactamente igual) ...

  # ==========================================
  # FASE 2: CONTINUOUS DEPLOYMENT (CD)
  # ==========================================
  deploy-dev:
    name: Deploy a Desarrollo 🚀
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    # OJO: Solo se ejecuta si los tests pasaron Y si el push fue en la rama 'dev'
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - name: 🚀 Disparar Deploy a Dev en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEV_HOOK }}
          echo "Deploy a rama 'dev' en Render disparado."

  smoke-test:
    name: Smoke Test en Ambiente Dev 🩺
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: 🩺 Verificar que la API responde (/health)
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://miapp-dev.onrender.com/health)
            if [[ $STATUS -eq 200 ]]; then
              echo "✅ El entorno de Desarrollo responde correctamente (HTTP $STATUS)"
              exit 0
            fi
            echo "Intento $i fallido (HTTP $STATUS), reintentando en 15 segundos..."
            sleep 15
          done
          echo "❌ Error: El ambiente Dev no respondió."
          exit 1

  deploy-prod:
    name: Deploy a Producción 👑
    needs: [ci-backend, ci-frontend] # Nota: Ya no depende del smoke-test de dev
    runs-on: ubuntu-latest
    # OJO: Solo se ejecuta si los tests pasaron Y si el push fue directo en la rama 'main'
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Disparar Deploy a Prod en Render
        run: |
          curl -X POST ${{ secrets.RENDER_PROD_HOOK }}
          echo "✅ Deploy a Producción (rama main) enviado."
