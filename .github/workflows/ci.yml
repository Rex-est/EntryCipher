name: SafeTicket Monorepo CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # FASE 1: CONTINUOUS INTEGRATION (CI)
  # ==========================================

  ci-backend:
    name: Tests + Análisis de Seguridad (Backend)
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Instalar dependencias del proyecto
      - name: Instalar dependencias
        run: |
          cd Backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Ejecutar pruebas con umbral de cobertura (mínimo 80%)
      - name: Ejecutar tests
        run: |
          cd Backend
          python -m pip install pytest pytest-cov pytest-custom-exit-code
          python -m pytest --cov=app --cov-report=xml --cov-fail-under=100 . -v --suppress-no-test-exit-code

      # 5. Análisis de Seguridad Estático (SAST) con Bandit
      - name: 🔒 Análisis de seguridad (Bandit)
        run: |
          python -m pip install bandit
          cd Backend
          python -m bandit -r . -ll -ii --exclude ./tests

      # 6. Subir reporte de cobertura a Codecov
      - name: Upload Backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: Backend/coverage.xml
          flags: backend

  ci-frontend:
    name: Build + Tests (Frontend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias
        run: |
          cd Frontend
          npm ci

      - name: Verificar construcción (Build)
        run: |
          cd Frontend
          npm run build

      - name: Ejecutar Pruebas Unitarias y Cobertura (mínimo 75%)
        run: |
          cd Frontend
          npx ng test --coverage --watch=false

      - name: Upload Frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: Frontend/coverage/clover.xml
          flags: frontend

  # ==========================================
  # FASE 2: CONTINUOUS DEPLOYMENT (CD)
  # ==========================================
  
  deploy-dev:
    name: Deploy a Desarrollo 🚀
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.base_ref == 'main')

    steps:
      - name: 🚀 Disparar Deploys a Dev en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEV_HOOK }}
          curl -X POST ${{ secrets.RENDER_FRONT_DEV_HOOK }}
          echo "Deploys de Backend y Frontend a ambiente Dev disparados."

  smoke-test:
    name: Smoke Test en Ambiente Dev 🩺
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: 🩺 Verificar que la API responde (/health)
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://miapp-dev.onrender.com/health)
            if [[ $STATUS -eq 200 ]]; then
              echo "✅ El entorno de Desarrollo responde correctamente (HTTP $STATUS)"
              exit 0
            fi
            echo "Intento $i fallido (HTTP $STATUS), reintentando en 15 segundos..."
            sleep 15
          done
          echo "❌ Error: El ambiente Dev no respondió."
          exit 1

  deploy-prod:
    name: Deploy a Producción 👑
    needs: [smoke-test] 
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Disparar Deploys a Prod en Render
        run: |
          curl -X POST ${{ secrets.RENDER_PROD_HOOK }}
          curl -X POST ${{ secrets.RENDER_FRONT_PROD_HOOK }}
          echo "✅ Deploys de Backend y Frontend a Producción enviados."
