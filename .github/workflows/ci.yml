name: SafeTicket Monorepo CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # FASE 1: CONTINUOUS INTEGRATION (CI)
  # ==========================================

  ci-backend:
    name: Tests + Análisis de Seguridad (Backend)
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. Instalar dependencias del proyecto
      - name: Instalar dependencias
        run: |
          cd Backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Forzar instalación de Pytest y ejecutar pruebas
      - name: Ejecutar tests
        run: |
          cd Backend
          python -m pip install pytest pytest-custom-exit-code
          python -m pytest . -v --suppress-no-test-exit-code

      # 5. Análisis de Seguridad Estático (SAST) con Bandit
      - name: 🔒 Análisis de seguridad (Bandit)
        run: |
          python -m pip install bandit
          cd Backend
          # -ll = reportar solo severidad MEDIA y ALTA
          # -ii = reportar solo confianza MEDIA y ALTA
          python -m bandit -r . -ll -ii --exclude ./tests

  ci-frontend:
    name: CI Frontend (Placeholder)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Instalar dependencias y Build
        run: |
          echo "Aquí van los comandos de tu Frontend si los necesitas en el futuro"

  # ==========================================
  # FASE 2: CONTINUOUS DEPLOYMENT (CD)
  # ==========================================
  
  deploy-dev:
    name: Deploy a Desarrollo 🚀
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    # Se ejecuta si los tests pasan Y si estás en la rama 'develop' (o si es un PR hacia ella)
    if: (github.ref == 'refs/heads/main' || github.base_ref == 'main')

    steps:
      - name: 🚀 Disparar Deploy a Dev en Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEV_HOOK }}
          echo "Deploy a rama 'develop' en Render disparado."

  smoke-test:
    name: Smoke Test en Ambiente Dev 🩺
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      - name: 🩺 Verificar que la API responde (/health)
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://miapp-dev.onrender.com/health)
            if [[ $STATUS -eq 200 ]]; then
              echo "✅ El entorno de Desarrollo responde correctamente (HTTP $STATUS)"
              exit 0
            fi
            echo "Intento $i fallido (HTTP $STATUS), reintentando en 15 segundos..."
            sleep 15
          done
          echo "❌ Error: El ambiente Dev no respondió."
          exit 1

  deploy-prod:
    name: Deploy a Producción 👑
    # CAMBIO CLAVE: Ahora producción espera estrictamente a que el Smoke Test de Dev sea exitoso
    needs: [smoke-test] 
    runs-on: ubuntu-latest
    # Solo se ejecuta de forma efectiva si los cambios se consolidan en la rama 'main'

    steps:
      - name: 🚀 Disparar Deploy a Prod en Render
        run: |
          curl -X POST ${{ secrets.RENDER_PROD_HOOK }}
          echo "✅ Deploy a Producción (rama main) enviado."
