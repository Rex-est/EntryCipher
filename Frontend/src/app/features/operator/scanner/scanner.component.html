<div class="min-h-screen bg-black text-white flex flex-col items-center justify-center p-6">
  <h1 class="text-3xl font-bold mb-8 text-green-500 font-mono">ENTRY-CIPHER SCANNER v1.0</h1>
  
  <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl border-2 border-green-900 shadow-2xl">
    <label class="block text-sm font-mono mb-2">SCAN O INGRESA CÓDIGO:</label>
    <input [(ngModel)]="ticketCode" 
           class="w-full p-4 bg-black border border-green-500 rounded text-green-400 text-2xl text-center focus:ring-2 focus:ring-green-300 outline-none mb-6"
           placeholder="X-999-ABC">

    <button (click)="validarTicket()" 
            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all">
      VALIDAR ENTRADA
    </button>

    <div *ngIf="statusMessage" 
         [ngClass]="isSuccess ? 'bg-green-900 border-green-500' : 'bg-red-900 border-red-500'"
         class="mt-6 p-4 border-2 rounded-lg text-center animate-pulse">
      <p class="text-xl font-bold">{{ statusMessage }}</p>
    </div>
  </div>
</div>
