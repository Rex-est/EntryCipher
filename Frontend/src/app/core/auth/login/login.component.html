<!-- Liquid Background -->
<div class="liquid-bg">
  <div class="blob w-[500px] h-[500px] bg-rose-300 top-0 -left-20 animate-blob"></div>
  <div class="blob w-[500px] h-[500px] bg-blue-300 bottom-0 -right-20 animate-blob [animation-delay:2s]"></div>
  <div class="blob w-[500px] h-[500px] bg-purple-300 top-1/2 left-1/3 animate-blob [animation-delay:4s]"></div>
</div>

<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 relative z-10">
  <app-glass-card [radius]="40" class="max-w-md w-full">
    <div class="p-10 space-y-8">
      <div>
        <div class="w-20 h-20 bg-rose-600 rounded-3xl mx-auto flex items-center justify-center text-white text-4xl font-black shadow-2xl shadow-rose-500/20 animate-bounce">S</div>
        <h2 class="mt-6 text-center text-4xl font-black text-slate-900 tracking-tighter">
          SafeTicket
        </h2>
        <p class="mt-2 text-center text-sm text-slate-500 font-medium uppercase tracking-widest">
          Acceso de Compradores
        </p>
      </div>

      <form class="mt-8 space-y-6" (ngSubmit)="onLogin()">
        <div class="space-y-4">
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase ml-4 mb-1">Email</label>
            <input name="email" type="email" required [(ngModel)]="credentials.email"
              class="w-full px-6 py-4 bg-white/40 border-none rounded-2xl focus:ring-4 ring-rose-100 transition-all font-medium text-slate-800"
              placeholder="nombre@ejemplo.com">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase ml-4 mb-1">Contraseña</label>
            <input name="password" type="password" required [(ngModel)]="credentials.password"
              class="w-full px-6 py-4 bg-white/40 border-none rounded-2xl focus:ring-4 ring-rose-100 transition-all font-medium text-slate-800"
              placeholder="••••••••">
          </div>
        </div>

        <div *ngIf="errorMessage" class="bg-red-500/10 p-4 rounded-xl text-red-600 text-xs font-bold text-center border border-red-500/20 backdrop-blur-md">
          {{ errorMessage }}
        </div>

        <button type="submit"
          class="w-full py-4 bg-slate-900 text-white font-black rounded-2xl hover:bg-rose-600 transition-all shadow-xl shadow-black/10 active:scale-95 uppercase tracking-widest">
          Ingresar al Portal
        </button>

        <div class="text-center mt-6">
          <a routerLink="/register" class="font-bold text-rose-600 hover:text-rose-700 text-sm transition-colors">
            ¿No tienes cuenta? Regístrate aquí →
          </a>
        </div>
      </form>
    </div>
  </app-glass-card>
</div>
