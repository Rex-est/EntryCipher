services:
  # Servidor de PRODUCCIÓN (Backend)
  - type: web
    name: entrycipher-backend
    env: python
    plan: free
    branch: main
    healthCheckPath: /health
    buildCommand: "pip install --upgrade pip && pip install --only-binary :all: -r Backend/requirements.txt"
    startCommand: "cd Backend && uvicorn main:app --host 0.0.0.0 --port $PORT"

  # Servidor de DESARROLLO (Backend)
  - type: web
    name: entrycipher-backend-dev
    env: python
    plan: free
    branch: main
    healthCheckPath: /health
    buildCommand: "pip install --upgrade pip && pip install --only-binary :all: -r Backend/requirements.txt"
    startCommand: "cd Backend && uvicorn main:app --host 0.0.0.0 --port $PORT"

  # Frontend de PRODUCCIÓN
  - type: static
    name: entrycipher-frontend
    env: static
    plan: free
    branch: main
    publishPath: Frontend/dist/Frontend
    buildCommand: "cd Frontend && npm install && npx ng build"

  # Frontend de DESARROLLO
  - type: static
    name: entrycipher-frontend-dev
    env: static
    plan: free
    branch: main
    publishPath: Frontend/dist/Frontend
    buildCommand: "cd Frontend && npm install && npx ng build"
